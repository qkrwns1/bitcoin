<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin RL</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0b0e11;
      --s1:     #161a1e;
      --s2:     #1c2127;
      --s3:     #222730;
      --bd:     #2b3139;
      --orange: #f0b90b;
      --green:  #0ecb81;
      --red:    #f6465d;
      --blue:   #1890ff;
      --text:   #eaecef;
      --muted:  #848e9c;
      --dim:    #5e6673;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr 150px;
      overflow: hidden;
      font-size: 13px;
    }

    /* ── HEADER ──────────────────────────── */
    header {
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--s1);
      border-bottom: 1px solid var(--bd);
      gap: 0;
    }
    .hdr-logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 15px; color: var(--orange);
      padding-right: 18px;
      border-right: 1px solid var(--bd);
      margin-right: 18px;
      white-space: nowrap;
    }
    .logo-circle {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px; color: #000;
    }
    .hdr-symbol { font-size: 15px; font-weight: 700; margin-right: 14px; white-space: nowrap; }
    .hdr-price  { font-size: 22px; font-weight: 700; line-height: 1; margin-right: 20px; }
    .hdr-stats  { display: flex; gap: 20px; flex: 1; overflow: hidden; }
    .hdr-stat   { display: flex; flex-direction: column; gap: 1px; }
    .hdr-stat .lbl { font-size: 10px; color: var(--muted); white-space: nowrap; }
    .hdr-stat .val { font-size: 12px; font-weight: 500; white-space: nowrap; }
    .hdr-right  { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .conn-dot   { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
    .conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .conn-dot.wait { background: var(--orange); animation: blink 1.2s infinite; }
    .conn-dot.dead { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .conn-lbl { font-size: 11px; color: var(--muted); }
    .sim-tag  {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      padding: 2px 7px; border-radius: 3px;
      background: rgba(24,144,255,.15); color: var(--blue);
      border: 1px solid rgba(24,144,255,.3);
    }

    /* ── MAIN ────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 260px;
      overflow: hidden;
    }

    /* Chart column */
    .chart-col {
      display: grid;
      grid-template-rows: 36px 1fr;
      overflow: hidden;
      border-right: 1px solid var(--bd);
    }
    .tf-bar {
      display: flex; align-items: center; gap: 2px;
      padding: 0 12px;
      background: var(--s1);
      border-bottom: 1px solid var(--bd);
    }
    .tf-btn {
      padding: 3px 10px; border-radius: 4px;
      border: none; background: transparent;
      color: var(--muted); font-size: 12px; font-weight: 500;
      font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .tf-btn:hover  { color: var(--text); background: var(--s2); }
    .tf-btn.active { color: var(--orange); background: rgba(240,185,11,.1); }
    #price-chart { width: 100%; height: 100%; }

    /* Side panel */
    .side {
      display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--s1);
    }
    .side-scroll {
      flex: 1; overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bd) transparent;
    }
    .card { padding: 12px 14px; border-bottom: 1px solid var(--bd); }
    .card-title {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--dim); margin-bottom: 9px;
    }
    .eq-big { font-size: 20px; font-weight: 700; letter-spacing: -.02em; line-height: 1; margin-bottom: 3px; }
    .eq-sub { font-size: 12px; font-weight: 500; }
    .up  { color: var(--green); }
    .dn  { color: var(--red); }
    .nu  { color: var(--muted); }

    /* Ratio levels */
    .ratio-levels { display: flex; gap: 3px; margin-bottom: 10px; }
    .ratio-btn {
      flex: 1; padding: 5px 0; border-radius: 4px;
      border: 1px solid var(--bd); background: var(--s2);
      color: var(--muted); font-size: 11px; font-weight: 600;
      text-align: center; transition: all .2s;
    }
    .ratio-btn.active {
      background: rgba(240,185,11,.2);
      border-color: var(--orange);
      color: var(--orange);
    }
    .kv { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
    .kv .k { color: var(--muted); }
    .kv .v { font-weight: 500; }
    .divline { height: 1px; background: var(--bd); margin: 7px 0; }

    /* Agent */
    .action-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--s2); border-radius: 5px;
      padding: 8px 12px; margin-bottom: 9px;
    }
    .action-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
    .action-val { font-size: 18px; font-weight: 700; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .stat-box   { background: var(--s2); border-radius: 4px; padding: 7px 10px; }
    .stat-box .sl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
    .stat-box .sv { font-size: 13px; font-weight: 600; }

    /* Demo/no-model banner */
    .demo-banner {
      padding: 6px 14px;
      background: rgba(240,185,11,.08);
      border-bottom: 1px solid rgba(240,185,11,.2);
      font-size: 11px; color: var(--orange);
      text-align: center; letter-spacing: .03em;
    }
    .demo-banner.hidden { display: none; }

    /* Log */
    .log-wrap  { flex: 1; display: flex; flex-direction: column; min-height: 120px; }
    .log-hdr   { padding: 6px 14px; border-bottom: 1px solid var(--bd); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); }
    .log-list  { flex: 1; overflow-y: auto; font-size: 11px; font-family: 'Consolas', monospace; scrollbar-width: thin; scrollbar-color: var(--bd) transparent; }
    .log-row   { display: grid; grid-template-columns: 40px 52px 1fr 64px; align-items: center; padding: 3px 14px; border-bottom: 1px solid rgba(43,49,57,.5); }
    .log-row:hover { background: var(--s2); }
    .log-ts    { color: var(--dim); }
    .log-act   { font-weight: 700; }
    .log-rw    { text-align: right; font-weight: 500; }
    .log-eq    { color: var(--muted); text-align: right; }
    .act-buy   { color: var(--green); }
    .act-sell  { color: var(--red); }
    .act-hold  { color: var(--dim); }
    .act-adj   { color: var(--blue); }

    /* ── POSITIONS TABLE (bottom) ────────── */
    .pos-section {
      background: var(--s1);
      border-top: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pos-tabs {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 16px;
      background: var(--s1);
      border-bottom: 1px solid var(--bd);
      height: 36px;
      flex-shrink: 0;
    }
    .pos-tab {
      padding: 0 16px;
      height: 100%;
      display: flex; align-items: center;
      font-size: 12px; font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
    }
    .pos-tab.active { color: var(--text); border-bottom-color: var(--orange); }
    .pos-count { font-size: 10px; color: var(--orange); margin-left: 4px; font-weight: 700; }

    .pos-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pos-head {
      display: grid;
      grid-template-columns: 100px 70px 110px 110px 130px 130px 120px 1fr;
      padding: 0 16px;
      height: 28px;
      align-items: center;
      border-bottom: 1px solid var(--bd);
      background: var(--s2);
      flex-shrink: 0;
    }
    .pos-head span { font-size: 11px; color: var(--muted); font-weight: 500; }
    .pos-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bd) transparent;
    }
    .pos-row {
      display: grid;
      grid-template-columns: 100px 70px 110px 110px 130px 130px 120px 1fr;
      padding: 0 16px;
      height: 44px;
      align-items: center;
      border-bottom: 1px solid rgba(43,49,57,.4);
    }
    .pos-row:hover { background: var(--s2); }
    .pos-row span  { font-size: 12px; font-weight: 500; }
    .pos-symbol    { display: flex; flex-direction: column; gap: 2px; }
    .pos-sym-main  { font-size: 12px; font-weight: 700; }
    .pos-sym-sub   { font-size: 10px; color: var(--muted); }
    .pos-empty     { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--dim); font-size: 12px; }

    .pnl-cell { display: flex; flex-direction: column; gap: 1px; }
    .pnl-main { font-size: 12px; font-weight: 600; }
    .pnl-pct  { font-size: 10px; }
  </style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────── -->
<header>
  <div class="hdr-logo">
    <div class="logo-circle">₿</div>
    RL
  </div>
  <span class="hdr-symbol">BTC/KRW</span>
  <div class="hdr-price up" id="hdr-price">-</div>
  <div class="hdr-stats">
    <div class="hdr-stat">
      <span class="lbl">24h 변화</span>
      <span class="val" id="hdr-chg">-</span>
    </div>
    <div class="hdr-stat">
      <span class="lbl">24h 고가</span>
      <span class="val" id="hdr-high">-</span>
    </div>
    <div class="hdr-stat">
      <span class="lbl">24h 저가</span>
      <span class="val" id="hdr-low">-</span>
    </div>
    <div class="hdr-stat">
      <span class="lbl">시뮬 수익률</span>
      <span class="val" id="hdr-roi">-</span>
    </div>
    <div class="hdr-stat">
      <span class="lbl">총 자산</span>
      <span class="val" id="hdr-equity">-</span>
    </div>
  </div>
  <div class="hdr-right">
    <div class="conn-dot wait" id="dot"></div>
    <span class="conn-lbl" id="status-text">연결 중...</span>
    <span class="sim-tag">SIMULATION</span>
  </div>
</header>

<!-- ── MAIN ──────────────────────────────────────── -->
<div class="main">

  <!-- Chart column -->
  <div class="chart-col">
    <div class="tf-bar">
      <button class="tf-btn" data-tf="weekly">주봉</button>
      <button class="tf-btn" data-tf="daily">일봉</button>
      <button class="tf-btn" data-tf="1h">1H</button>
      <button class="tf-btn active" data-tf="5m">5M</button>
    </div>
    <div id="price-chart"></div>
  </div>

  <!-- Side panel -->
  <div class="side">
    <div class="demo-banner hidden" id="demo-banner">DEMO MODE — 모델 없음</div>

    <div class="side-scroll">

      <!-- Portfolio summary -->
      <div class="card">
        <div class="card-title">포트폴리오</div>
        <div class="eq-big" id="equity-val">₩1,000,000</div>
        <div class="eq-sub nu" id="equity-pnl">+₩0 (+0.00%)</div>
      </div>

      <!-- Position -->
      <div class="card">
        <div class="card-title">포지션</div>
        <div class="ratio-levels">
          <div class="ratio-btn" data-r="0">0%</div>
          <div class="ratio-btn" data-r="25">25%</div>
          <div class="ratio-btn" data-r="50">50%</div>
          <div class="ratio-btn" data-r="75">75%</div>
          <div class="ratio-btn" data-r="100">100%</div>
        </div>
        <div class="kv"><span class="k">평균 진입가</span><span class="v" id="entry-price-val">-</span></div>
        <div class="kv"><span class="k">BTC 보유</span><span class="v" id="btc-val">-</span></div>
        <div class="kv"><span class="k">현금</span><span class="v" id="cash-val">-</span></div>
      </div>

      <!-- Agent -->
      <div class="card">
        <div class="card-title">에이전트</div>
        <div class="action-row">
          <div>
            <div class="action-lbl">목표 비중</div>
            <div class="action-val" id="target-ratio-display">-</div>
          </div>
          <div style="text-align:right">
            <div class="action-lbl">리워드</div>
            <div class="action-val" id="reward-val" style="font-size:14px">-</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="sl">스텝</div>
            <div class="sv" id="step-val">-</div>
          </div>
          <div class="stat-box">
            <div class="sl">거래 횟수</div>
            <div class="sv" id="trade-count-val">0</div>
          </div>
          <div class="stat-box">
            <div class="sl">WIN</div>
            <div class="sv up" id="win-val">0</div>
          </div>
          <div class="stat-box">
            <div class="sl">LOSS</div>
            <div class="sv dn" id="loss-val">0</div>
          </div>
        </div>
      </div>

    </div><!-- /side-scroll -->

    <!-- Log -->
    <div class="log-wrap">
      <div class="log-hdr">실시간 로그</div>
      <div class="log-list" id="log-list"></div>
    </div>

  </div><!-- /side -->
</div><!-- /main -->

<!-- ── POSITIONS TABLE ────────────────────────────── -->
<div class="pos-section">
  <div class="pos-tabs">
    <div class="pos-tab active">포지션<span class="pos-count" id="pos-count">0</span></div>
    <div class="pos-tab">체결 내역</div>
    <div class="pos-tab">로그</div>
  </div>
  <div class="pos-grid">
    <div class="pos-head">
      <span>심볼</span>
      <span>비중</span>
      <span>진입가</span>
      <span>현재가</span>
      <span>미실현 손익</span>
      <span>실현 손익</span>
      <span>총 수익률</span>
      <span>타임스탬프</span>
    </div>
    <div class="pos-body" id="pos-body">
      <div class="pos-empty" id="pos-empty">포지션 없음</div>
    </div>
  </div>
</div>

<script>
// ── Constants ───────────────────────────────────────
const INITIAL_EQUITY = 1_000_000;
const TARGET_LEVELS  = [0, 25, 50, 75, 100];

let tradeCount = 0, winCount = 0, lossCount = 0;
let lastRealizedPnl = 0;
let tradeMarkers = [];
let hasPosition = false;

// ── Chart setup ─────────────────────────────────────
const BASE_OPT = {
  autoSize: true,
  layout: { background: { color: '#0b0e11' }, textColor: '#5e6673' },
  grid: { vertLines: { color: '#1c2127' }, horzLines: { color: '#1c2127' } },
  timeScale: { borderColor: '#2b3139', timeVisible: true, secondsVisible: false },
  rightPriceScale: { borderColor: '#2b3139', autoScale: true },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  handleScroll: true, handleScale: true,
};

const priceChart  = LightweightCharts.createChart(document.getElementById('price-chart'), BASE_OPT);
const candleSeries = priceChart.addCandlestickSeries({
  upColor: '#0ecb81', downColor: '#f6465d',
  borderUpColor: '#0ecb81', borderDownColor: '#f6465d',
  wickUpColor: '#0ecb81', wickDownColor: '#f6465d',
});
const volSeries = priceChart.addHistogramSeries({
  priceFormat: { type: 'volume' },
  priceScaleId: 'vol',
});
priceChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });

let entryLine = null;
let currentEntryPrice = 0;
let lastSimTime = 0;
let latestLivePrice = 0;
let latestPortfolio = null; // last WebSocket data snapshot

// ── Helpers ─────────────────────────────────────────
const fmt   = n => '₩' + Math.round(n).toLocaleString('ko-KR');
const fmtS  = n => Math.round(n).toLocaleString('ko-KR');
const pct   = (n, d=2) => (n >= 0 ? '+' : '') + (n*100).toFixed(d) + '%';
const cls   = n => n > 0 ? 'up' : n < 0 ? 'dn' : 'nu';
const $     = id => document.getElementById(id);
const set   = (id, v) => { const e=$(id); if(e) e.textContent=v; };
const setC  = (id, c) => { const e=$(id); if(e) e.className=c; };
const KST   = 9*3600;

function toKST(s) {
  return Math.floor(new Date(s.replace(' ','T')+'Z').getTime()/1000) + KST;
}

// ── Ratio level buttons ──────────────────────────────
function setRatioLevel(rPct) {
  const nearest = TARGET_LEVELS.reduce((a,b) => Math.abs(b-rPct) < Math.abs(a-rPct) ? b : a);
  document.querySelectorAll('.ratio-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.r) === nearest);
  });
}

// ── Entry price line ─────────────────────────────────
function drawEntryLine(price) {
  return candleSeries.createPriceLine({
    price, color: '#f0b90b', lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    axisLabelVisible: true, title: '진입가',
  });
}

function updateEntryLine(price) {
  currentEntryPrice = price;
  if (price > 0) {
    if (!entryLine) {
      entryLine = drawEntryLine(price);
    } else {
      entryLine.applyOptions({ price });
    }
  } else if (entryLine) {
    candleSeries.removePriceLine(entryLine);
    entryLine = null;
  }
}

// ── Positions table row ──────────────────────────────
function updatePosTable(d) {
  const ratioPct  = Math.round((d.target_ratio ?? 0) * 100);
  const ep        = d.avg_entry_price ?? 0;
  // 실시간 가격 우선, 없으면 WebSocket close
  const cp        = latestLivePrice > 0 ? latestLivePrice : (d.close ?? 0);
  const btc       = d.btc_holding ?? 0;
  const upnl      = ep > 0 && btc > 0 ? btc * (cp - ep) : 0;
  const rpnl      = d.realized_pnl ?? 0;
  // equity도 live price 기준으로 재계산
  const equity    = (d.cash ?? 0) + btc * cp;
  const roi       = (equity - INITIAL_EQUITY) / INITIAL_EQUITY;
  const ts        = d.ts ? d.ts.substring(0, 16) : '-';

  if (ratioPct === 0 && btc < 1e-9) {
    $('pos-empty').style.display = 'flex';
    $('pos-count').textContent = '0';
    hasPosition = false;
    return;
  }

  $('pos-empty').style.display = 'none';
  $('pos-count').textContent = '1';
  hasPosition = true;

  let row = $('pos-data-row');
  if (!row) {
    row = document.createElement('div');
    row.id = 'pos-data-row';
    row.className = 'pos-row';
    $('pos-body').prepend(row);
  }

  const upnlSign  = upnl >= 0 ? '+' : '';
  const rpnlSign  = rpnl >= 0 ? '+' : '';
  const roiSign   = roi  >= 0 ? '+' : '';
  const upnlCls   = cls(upnl);
  const rpnlCls   = cls(rpnl);
  const roiCls    = cls(roi);
  const ratioCls  = ratioPct > 0 ? 'up' : 'nu';

  row.innerHTML = `
    <span class="pos-symbol">
      <span class="pos-sym-main">KRW-BTC</span>
      <span class="pos-sym-sub">시뮬레이션</span>
    </span>
    <span class="${ratioCls}">${ratioPct}%</span>
    <span>${ep > 0 ? fmtS(ep) : '-'}</span>
    <span>${cp > 0 ? fmtS(cp) : '-'}</span>
    <span class="pnl-cell">
      <span class="pnl-main ${upnlCls}">${upnlSign}${fmt(upnl)}</span>
      <span class="pnl-pct ${upnlCls}">${ep > 0 && btc > 0 ? upnlSign + ((upnl/(ep*btc))*100).toFixed(2) + '%' : '-'}</span>
    </span>
    <span class="${rpnlCls}">${rpnlSign}${fmt(rpnl)}</span>
    <span class="${roiCls}">${roiSign}${(roi*100).toFixed(2)}%</span>
    <span style="color:var(--dim);font-size:11px">${ts}</span>
  `;
}

// ── Main render ──────────────────────────────────────
let _raf = false, _pending = null;

function scheduleRender(d) {
  _pending = d;
  if (!_raf) { _raf = true; requestAnimationFrame(render); }
}

function render() {
  _raf = false;
  const d = _pending; if (!d) return;

  const roi      = (d.equity - INITIAL_EQUITY) / INITIAL_EQUITY;
  const pnl      = d.equity - INITIAL_EQUITY;
  const ratioPct = Math.round((d.target_ratio ?? 0) * 100);
  const ep       = d.avg_entry_price ?? 0;
  const cp       = d.close ?? 0;
  const btc      = d.btc_holding ?? 0;
  const upnl     = ep > 0 && btc > 0 ? btc * (cp - ep) : 0;

  // Portfolio
  set('equity-val', fmt(d.equity));
  set('equity-pnl', (pnl >= 0 ? '+' : '') + fmt(pnl) + ' (' + pct(roi) + ')');
  setC('equity-pnl', 'eq-sub ' + cls(pnl));
  set('hdr-equity', fmt(d.equity));

  // Position
  setRatioLevel(ratioPct);
  set('entry-price-val', ep > 0 ? fmt(ep) : '-');
  set('btc-val', btc.toFixed(6) + ' BTC');
  set('cash-val', fmt(d.cash ?? 0));
  updateEntryLine(ep > 0 && btc > 0 ? ep : 0);

  // Agent
  set('target-ratio-display', ratioPct + '%');
  setC('target-ratio-display', 'action-val ' + (ratioPct > 0 ? 'up' : 'nu'));
  const rw = d.reward ?? 0;
  set('reward-val', (rw >= 0 ? '+' : '') + rw.toFixed(5));
  setC('reward-val', 'action-val ' + cls(rw));
  set('step-val', (d.step ?? 0).toLocaleString());

  if (d.trade_executed) {
    tradeCount++;
    const rpnl = d.realized_pnl ?? 0;
    if (rpnl > lastRealizedPnl) winCount++;
    else if (rpnl < lastRealizedPnl) lossCount++;
    lastRealizedPnl = rpnl;
  }
  set('trade-count-val', tradeCount.toLocaleString());
  set('win-val',  winCount);
  set('loss-val', lossCount);

  // Header
  set('hdr-roi', pct(roi));
  setC('hdr-roi', 'val ' + cls(roi));

  // Positions table
  latestPortfolio = d;
  updatePosTable(d);

  // Log
  if (d.trade_executed || (d.step ?? 0) % 200 === 0) addLog(d);

  // Chart
  if (d.ts && d.close) {
    const t = toKST(d.ts);
    if (t > 0) {
      lastSimTime = t;
      candleSeries.update({ time: t, open: d.open, high: d.high, low: d.low, close: d.close });
      volSeries.update({
        time: t, value: Math.abs(btc),
        color: d.close >= d.open ? 'rgba(14,203,129,.3)' : 'rgba(246,70,93,.3)',
      });

      if (d.trade_executed) {
        const prevRatio = addLog._prevRatio ?? 0;
        const isUp = ratioPct > prevRatio;
        tradeMarkers.push({
          time: t,
          position: isUp ? 'belowBar' : 'aboveBar',
          color: isUp ? '#0ecb81' : '#f6465d',
          shape: isUp ? 'arrowUp' : 'arrowDown',
          text: ratioPct + '%',
        });
        if (tradeMarkers.length > 200) tradeMarkers.shift();
        candleSeries.setMarkers(tradeMarkers);
      }
    }
  }
}

// ── Log ──────────────────────────────────────────────
const MAX_LOG = 150;
function addLog(d) {
  const list = $('log-list'); if (!list) return;
  const ratio     = Math.round((d.target_ratio ?? 0) * 100);
  const prevRatio = addLog._prevRatio ?? 0;
  addLog._prevRatio = ratio;

  let act, ac;
  if (d.trade_executed) {
    if (ratio > prevRatio + 1)      { act = '▲ BUY';  ac = 'act-buy'; }
    else if (ratio < prevRatio - 1) { act = '▼ SELL'; ac = 'act-sell'; }
    else                             { act = '↔ ADJ';  ac = 'act-adj'; }
  } else { act = '— HOLD'; ac = 'act-hold'; }

  const ts = d.ts ? d.ts.substring(11,16) : '--:--';
  const rw = d.reward ?? 0;
  const eq = '₩' + Math.round((d.equity ?? 0) / 1000) + 'K';

  const row = document.createElement('div');
  row.className = 'log-row';
  [ts, act, (rw>=0?'+':'')+rw.toFixed(4), eq].forEach((c, i) => {
    const s = document.createElement('span');
    s.className = ['log-ts', 'log-act '+ac, 'log-rw '+(rw>=0?'up':'dn'), 'log-eq'][i];
    s.textContent = c;
    row.appendChild(s);
  });
  list.prepend(row);
  while (list.children.length > MAX_LOG) list.removeChild(list.lastChild);
}

// ── WebSocket ─────────────────────────────────────────
const dotEl  = $('dot');
const statEl = $('status-text');

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    dotEl.className = 'conn-dot live';
    statEl.textContent = '추론 중';
    fetch('/api/status').then(r=>r.json()).then(s => {
      if (!s.model_loaded) {
        dotEl.className = 'conn-dot wait';
        statEl.textContent = '모델 대기 중';
        $('demo-banner').classList.remove('hidden');
      }
    }).catch(()=>{});
  };
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'step')   scheduleRender(d);
    if (d.type === 'update') { tradeCount=0; winCount=0; lossCount=0; lastRealizedPnl=0; }
  };
  ws.onclose = () => {
    dotEl.className = 'conn-dot dead';
    statEl.textContent = '재연결 중...';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}
connect();

// ── Live header price ─────────────────────────────────
async function fetchPrice() {
  try {
    const r = await fetch('/api/candles?count=1');
    const [c] = await r.json();
    if (!c) return;
    const price  = c.trade_price;
    const change = (c.trade_price - c.opening_price) / c.opening_price;
    const pe = $('hdr-price');
    pe.textContent = fmt(price);
    pe.className   = 'hdr-price ' + (change >= 0 ? 'up' : 'dn');
    const ce = $('hdr-chg');
    ce.textContent = pct(change);
    ce.className   = 'val ' + cls(change);
    set('hdr-high', fmt(c.high_price));
    set('hdr-low',  fmt(c.low_price));

    // 실시간 가격으로 포지션 현재가 + 미실현손익 갱신
    latestLivePrice = price;
    if (latestPortfolio) updatePosTable(latestPortfolio);
  } catch {}
}
fetchPrice();
setInterval(fetchPrice, 10_000);

// ── TF switcher ───────────────────────────────────────
async function loadTF(tf) {
  try {
    const r = await fetch('/api/history?tf=' + tf);
    const { candles } = await r.json();
    if (!candles?.length) return;
    const cs = candles.map(c => ({ time: c.t, open: c.o, high: c.h, low: c.l, close: c.c }));
    candleSeries.setData(cs);
    volSeries.setData(cs.map(c => ({
      time: c.time, value: 0,
      color: c.close >= c.open ? 'rgba(14,203,129,.3)' : 'rgba(246,70,93,.3)',
    })));
    // Remove existing entry line before setData invalidates it, then re-draw
    if (entryLine) { try { candleSeries.removePriceLine(entryLine); } catch(e) {} }
    entryLine = null;
    if (currentEntryPrice > 0) entryLine = drawEntryLine(currentEntryPrice);
    // Scroll to simulation's current time if running, otherwise fit all
    if (lastSimTime > 0) {
      priceChart.timeScale().setVisibleRange({
        from: lastSimTime - 3600 * 24 * 3,
        to:   lastSimTime + 3600 * 6,
      });
    } else {
      priceChart.timeScale().fitContent();
    }
  } catch {}
}

document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTF(btn.dataset.tf);
  });
});

loadTF('5m');
setInterval(() => loadTF(document.querySelector('.tf-btn.active')?.dataset.tf ?? '5m'), 5*60_000);
